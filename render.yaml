# Render Blueprint — one Node service hosting the web UI + relay.
#
# This single web service runs `combined-server.mjs`, which:
#   - Serves the built Next.js app (apps/web/.next) on `/`, `/host`, etc.
#   - Serves the WebSocket relay on `/relay` (binary framed protocol)
#   - Exposes `/health` for Render's health probe
#   - Exposes `/devices` (JSON) so the picker UI can list online hosts
#
# The host agent is NOT deployed here — it runs on your local machine
# (nut-js needs a real display to inject input into, so it cannot run in a
# headless cloud container). Point the local agent at this service with:
#
#   npm run host -- --relay wss://<your-service>.onrender.com/relay
#
# Use the Starter plan (not Free). Free sleeps after idle and drops the
# long-lived WebSockets the relay depends on.

services:
  - type: web
    name: remote-access
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: node combined-server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
