# Render Blueprint — single service deploy.
#
# ONE service hosts:
#   - the Next.js controller UI (served on /, /host, etc.)
#   - the WebSocket relay      (served on /relay)
#   - the /devices HTTP API    (relay device list)
#
# Entry point: combined-server.mjs (at repo root). That file boots Next.js
# in production mode and attaches the relay to the same HTTP server so both
# share one port ($PORT, injected by Render).
#
# The host agent is NOT deployed — it runs on whatever local machine you want
# to control. It dials wss://<this-service>.onrender.com/relay.
#
# Use the Starter plan (not Free). Free sleeps after idle and drops the
# long-lived WebSockets the relay depends on.

services:
  - type: web
    name: remote-control
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm install --include=dev && npm --workspace apps/web run build
    startCommand: node combined-server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
