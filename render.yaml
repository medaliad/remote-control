# Render Blueprint — one Node service hosting everything.
#
# This single web service:
#   - Serves the built React app (web/dist) on `/`
#   - Serves the signaling WebSocket on `/ws`
#   - Serves a JSON `/health` endpoint for Render's health probe
#
# Why one service instead of two:
#   Keeping frontend and backend on the same origin sidesteps CORS *and*
#   Mixed Content — the browser loads the page over HTTPS and opens the
#   WebSocket over WSS on the same host, which browsers treat as secure
#   by default.
#
# Use the Starter plan (not Free). Free sleeps after idle and drops the
# long-lived WebSockets the signaling layer depends on.

services:
  - type: web
    name: remote-access
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
