<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b12" />
    <title>Remote Access</title>
    <!--
      simple-peer + readable-stream need `process.nextTick`. Shim it with
      queueMicrotask (same semantics, no extra bundle cost). `global` is
      aliased to `globalThis` via vite.config.ts `define`.
    -->
    <script>
      window.process = window.process || { env: {}, nextTick: function (cb) { queueMicrotask(cb); } };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
